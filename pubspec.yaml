name: musicolector
description: "App para organizar coleções de álbuns e singles de música. (Trabalho de Desenvolvimento Multiplataforma Desktop)"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>= 3.11.0 < 4.0.0'

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.0.0
  path: ^1.8.0
  path_provider: ^2.0.0
  sqflite_common_ffi: ^2.4.0+3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
